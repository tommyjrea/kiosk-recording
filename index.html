<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiosk Recording</title>
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background-color 0.3s ease;
}

img {
  width: 160px;
  height: auto;
  display: block;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
</style>
</head>
<body>

<img id="logo" src="K_Block_Red_White_Small.png" alt="Kiosk Recording">

<script>
var states = [
  { bg: '#fdfdfd', src: 'K_Block_Red_White_Small.png' },
  { bg: '#781c1f', src: 'K_Block_Red_DarkRed.png' },
  { bg: '#fd3248', src: 'K_Block_White_Red.png' }
];

var current = 0;
var logo = document.getElementById('logo');

// Preload
states.forEach(function(s) {
  var img = new Image();
  img.src = s.src;
});

function cycle() {
  current = (current + 1) % states.length;
  document.body.style.backgroundColor = states[current].bg;
  logo.src = states[current].src;
}

// Set initial state
document.body.style.backgroundColor = states[0].bg;

// Desktop: hover
logo.addEventListener('mouseenter', cycle);

// Mobile: tap
logo.addEventListener('touchstart', function(e) {
  e.preventDefault();
  cycle();
});
</script>

</body>
</html>
